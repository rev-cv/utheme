  page-bar, top-bar, main-bar, site-bar,
  header-row, head-band, page-head, site-head, nav-head,
  main-wrap, top-wrap, head-row, header-band, nav-band,
  site-strip, page-strip, main-strip, top-strip,
  head-cap, page-cap, site-wrap, head-strip, nav-strip,
  header-zone, top-zone
]

