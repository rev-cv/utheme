# keyclass-main-menu.yml
# BEM-based: only block names + standalone state classes are listed.
# Elements (ut-panel__head etc.) are derived automatically — when ut-panel → amber,
# ut-panel__head becomes amber__head via simple string replace.
# Within every theme column all names must be unique — enforced at load time.
# 21 keys × 25 variants = 525 entries, all globally unique.

