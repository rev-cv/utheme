services:
  wordpress:
    image: wordpress:latest
    container_name: "${CONTAINER_NAME:-wp_site}"
    ports:
      - "127.0.0.1:${HOST_PORT}:80"
    restart: unless-stopped
    environment:
      WORDPRESS_DB_HOST: wp_shared_db
      WORDPRESS_DB_USER: ${DB_USER}
      WORDPRESS_DB_PASSWORD: ${DB_PASSWORD}
      WORDPRESS_DB_NAME: ${DB_NAME}
      WORDPRESS_CONFIG_EXTRA: "define('WP_HOME','${SITE_URL}');define('WP_SITEURL','${SITE_URL}');"
    volumes:
      - wp_html:/var/www/html
      - ./utheme:/var/www/html/wp-content/themes/utheme
      - ./uploads:/var/www/html/wp-content/uploads
      - ./plugins:/var/www/html/wp-content/plugins
      - ./wp-conf/uploads.ini:/usr/local/etc/php/conf.d/uploads.ini
      - ./wp-conf/.htaccess:/var/www/html/.htaccess
      - ./wp-conf/wp-config.php:/var/www/html/wp-config.php
    networks:
      - web_network
      - shared_db_network

    deploy:
      resources:
        limits:
          cpus: '${WP_CPU_LIMIT:-0.5}'
          memory: ${WP_MEM_LIMIT:-256m}

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  sass:
    image: node:alpine
    working_dir: /src
    volumes:
      - ./utheme/src:/src
    profiles:
      - dev
    command: >
      sh -c "npm install -g sass@1.77.8 &&
      sass --watch --poll --style=compressed style.scss:style.css"

volumes:
  wp_html:

networks:
  web_network:
    external: true
  shared_db_network:
    external: true
